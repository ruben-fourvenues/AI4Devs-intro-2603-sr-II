<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reserse String</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: #ffffff;
        font-family: Arial, sans-serif;
        font-size: 14px;
        color: #000000;
        padding: 40px 32px;
      }

      h1 {
        font-family: Arial, sans-serif;
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 24px;
      }

      .container {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
        max-width: 480px;
      }

      #input-text {
        font-family: Arial, sans-serif;
        font-size: 14px;
        width: 100%;
        padding: 8px 12px;
        background-color: #ffffff;
        border: 1.5px solid #555555;
        border-radius: 4px;
        color: #000000;
        outline: none;
        transition: border-color 0.15s ease;
      }

      #input-text:hover {
        border-color: #000000;
      }

      #input-text:focus {
        border-color: #000000;
      }

      /* ── Botón primario ── */
      #btn-reverse {
        font-family: Arial, sans-serif;
        font-size: 14px;
        font-weight: bold;
        color: #ffffff;
        background-color: #1a56db; /* azul accesible sobre blanco: ratio > 4.5 */
        border: none;
        border-radius: 4px;
        padding: 8px 20px;
        cursor: pointer;
        transition: background-color 0.15s ease;
      }

      #btn-reverse:hover {
        background-color: #1447c0;
      }

      #btn-reverse:active {
        background-color: #0f389a;
      }

      #btn-reverse:focus-visible {
        outline: 3px solid #93b4f7;
        outline-offset: 2px;
      }

      /* ── Texto invertido ── */
      #output-section {
        display: none;
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
        width: 100%;
      }

      #output-section.visible {
        display: flex;
      }

      #output-label {
        font-family: Arial, sans-serif;
        font-size: 14px;
        font-weight: bold;
        color: #000000;
      }

      #output-text {
        font-family: Arial, sans-serif;
        font-size: 14px;
        color: #000000;
        word-break: break-all;
      }

      /* ── Botón secundario ── */
      #btn-copy {
        font-family: Arial, sans-serif;
        font-size: 14px;
        font-weight: bold;
        color: #ffffff;
        background-color: #4b5563; /* gris accesible: ratio > 4.5 sobre blanco */
        border: none;
        border-radius: 4px;
        padding: 8px 20px;
        cursor: pointer;
        transition: background-color 0.15s ease;
      }

      #btn-copy:hover {
        background-color: #374151;
      }

      #btn-copy:active {
        background-color: #1f2937;
      }

      #btn-copy:focus-visible {
        outline: 3px solid #9ca3af;
        outline-offset: 2px;
      }

      /* ── Feedback de copiado ── */
      #copy-feedback {
        font-family: Arial, sans-serif;
        font-size: 13px;
        color: #166534;
        display: none;
      }

      #copy-feedback.visible {
        display: inline;
      }
    </style>
  </head>
  <body>
    <h1>Reserse String</h1>

    <div class="container">
      <input
        type="text"
        id="input-text"
        placeholder="Introduce tu texto aquí"
        aria-label="Texto a invertir"
      />

      <button id="btn-reverse" type="button" aria-label="Invertir texto">
        Reverse
      </button>

      <section id="output-section" aria-live="polite" aria-label="Resultado">
        <span id="output-label">Texto invertido:</span>
        <span id="output-text"></span>
        <div style="display: flex; align-items: center; gap: 12px;">
          <button id="btn-copy" type="button" aria-label="Copiar texto invertido al portapapeles">
            Copiar
          </button>
          <span id="copy-feedback" role="status">¡Copiado!</span>
        </div>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
